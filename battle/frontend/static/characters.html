<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Каталог персонажей — D&D 2024</title>
<style>
*{box-sizing:border-box;margin:0;padding:0}
:root{
  --bg:#f4f6fb;--panel:#ffffff;--ink:#1f2733;--dim:#6b7689;--line:#e4e8f0;--line2:#eef1f6;
  --blue:#3b82f6;--green:#22a06b;--red:#e0556a;--amber:#d9930b;--purple:#8b5cf6;--slate:#64748b;
  --shadow:0 1px 3px rgba(20,30,60,.06),0 8px 24px rgba(20,30,60,.05);
  --r:14px;
}
html,body{height:100%;background:var(--bg);color:var(--ink);
  font-family:'Inter','Segoe UI',system-ui,sans-serif;font-size:14px;-webkit-font-smoothing:antialiased}
body{display:flex;flex-direction:column;min-height:100vh}
a{color:inherit;text-decoration:none}

/* top bar */
.topbar{height:60px;background:var(--panel);border-bottom:1px solid var(--line);
  display:flex;align-items:center;gap:18px;padding:0 26px;position:sticky;top:0;z-index:20}
.brand{font-size:17px;font-weight:800;letter-spacing:.5px;display:flex;align-items:center;gap:8px}
.brand .swords{color:var(--amber)}
.topnav{display:flex;gap:6px;margin-left:8px}
.topnav a{padding:8px 14px;border-radius:9px;color:var(--dim);font-weight:600;font-size:13px}
.topnav a.on,.topnav a:hover{background:#eef3ff;color:var(--blue)}
.spacer{flex:1}
.btn{padding:8px 16px;border-radius:10px;border:1px solid var(--line);background:var(--panel);
  color:var(--ink);font-weight:600;font-size:13px;cursor:pointer;transition:.12s}
.btn:hover{border-color:var(--blue);color:var(--blue)}
.btn-primary{background:var(--blue);border-color:var(--blue);color:#fff}
.btn-primary:hover{background:#2f6fe0;color:#fff}
.btn-sm{padding:5px 11px;font-size:12px;border-radius:8px}

.wrap{max-width:1320px;margin:0 auto;width:100%;padding:26px;flex:1}

/* ───── Catalog ───── */
.cat-head{display:flex;align-items:center;justify-content:space-between;margin-bottom:18px}
.cat-head h1{font-size:24px;font-weight:800}
.cat-sub{color:var(--dim);font-size:13px;margin-top:3px}
.cat-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(260px,1fr));gap:16px}
.cat-card{background:var(--panel);border:1px solid var(--line);border-radius:var(--r);padding:18px;
  box-shadow:var(--shadow);cursor:pointer;transition:.14s;position:relative}
.cat-card:hover{transform:translateY(-3px);border-color:#cfd9ec;box-shadow:0 8px 28px rgba(20,30,60,.1)}
.cat-card .pf{font-size:40px;line-height:1}
.cat-card .cc-top{display:flex;align-items:center;gap:14px;margin-bottom:12px}
.cat-card .cc-name{font-size:18px;font-weight:800}
.cat-card .cc-meta{font-size:12px;color:var(--dim);margin-top:2px}
.cat-card .cc-stats{display:flex;gap:8px;flex-wrap:wrap}
.mini-stat{flex:1;min-width:60px;text-align:center;background:var(--bg);border:1px solid var(--line2);
  border-radius:9px;padding:7px 4px}
.mini-stat .v{font-size:16px;font-weight:800}
.mini-stat .k{font-size:10px;color:var(--dim);text-transform:uppercase;letter-spacing:.5px}
.cat-card .cc-del{position:absolute;top:12px;right:12px;width:26px;height:26px;border-radius:8px;
  border:1px solid var(--line);background:var(--panel);color:var(--dim);cursor:pointer;opacity:0;transition:.12s;
  display:flex;align-items:center;justify-content:center}
.cat-card:hover .cc-del{opacity:1}
.cat-card .cc-del:hover{border-color:var(--red);color:var(--red)}
.cat-empty{background:var(--panel);border:1px dashed var(--line);border-radius:var(--r);
  padding:60px;text-align:center;color:var(--dim);grid-column:1/-1}
.add-card{background:var(--panel);border:1px dashed #c7d2e6;border-radius:var(--r);
  display:flex;flex-direction:column;align-items:center;justify-content:center;gap:8px;cursor:pointer;
  color:var(--blue);font-weight:700;min-height:150px;transition:.14s}
.add-card:hover{background:#f4f8ff;border-color:var(--blue)}
.add-card .plus{font-size:34px;line-height:1}

/* ───── Sheet ───── */
.sheet-head{display:flex;align-items:center;gap:16px;margin-bottom:16px}
.sheet-head .back{cursor:pointer;color:var(--dim);font-weight:600;font-size:13px;display:flex;align-items:center;gap:6px}
.sheet-head .back:hover{color:var(--blue)}
.hero-id{display:flex;align-items:center;gap:14px}
.hero-id .pf{font-size:44px}
.hero-id .hn{font-size:24px;font-weight:800}
.hero-id .hm{font-size:13px;color:var(--dim)}

.tabs{display:flex;gap:4px;border-bottom:1px solid var(--line);margin-bottom:20px;overflow-x:auto}
.tab{padding:12px 18px;color:var(--dim);font-weight:600;font-size:14px;cursor:pointer;
  border-bottom:2px solid transparent;display:flex;align-items:center;gap:7px;white-space:nowrap}
.tab:hover{color:var(--ink)}
.tab.on{color:var(--blue);border-bottom-color:var(--blue)}

.card{background:var(--panel);border:1px solid var(--line);border-radius:var(--r);box-shadow:var(--shadow);padding:22px}
.card h2{font-size:20px;font-weight:800;margin-bottom:14px}
.card h3{font-size:13px;font-weight:700;color:var(--dim);text-transform:uppercase;letter-spacing:1px;margin-bottom:10px}

.main-grid{display:grid;grid-template-columns:300px 320px 1fr;gap:20px;align-items:start}
@media(max-width:1100px){.main-grid{grid-template-columns:1fr}}

/* ability rows */
.stat-row{display:flex;align-items:center;gap:10px;border:1px solid var(--line);border-left:4px solid var(--slate);
  border-radius:10px;padding:10px 12px;margin-bottom:8px}
.stat-row .sr-name{font-weight:800;letter-spacing:.5px;width:38px}
.stat-row .sr-score{color:var(--dim);width:28px;text-align:center}
.stat-row .sr-mod{margin-left:auto;font-weight:800;font-size:15px;width:38px;text-align:center}
.stat-row .sr-save{font-weight:700;width:40px;text-align:center;color:var(--ink);
  background:var(--bg);border:1px solid var(--line2);border-radius:7px;padding:2px 0;font-size:13px}
.stat-row .sr-save.prof{background:#eaf3ff;border-color:#cfe0ff;color:var(--blue)}
.col-key{display:flex;gap:10px;font-size:10px;color:var(--dim);text-transform:uppercase;letter-spacing:.5px;
  justify-content:flex-end;margin:-4px 2px 8px}

.tiles{display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-top:14px}
.tile{border-radius:11px;padding:12px;text-align:center}
.tile .tk{font-size:12px;font-weight:700;margin-bottom:3px}
.tile .tv{font-size:22px;font-weight:800}
.tile.b{background:#eef3ff}.tile.b .tk{color:var(--blue)}
.tile.p{background:#f3edff}.tile.p .tk{color:var(--purple)}
.tile.g{background:#e9f7f0}.tile.g .tk{color:var(--green)}
.tile.o{background:#fdf1e3}.tile.o .tk{color:var(--amber)}
.tile.r{background:#fdecef}.tile.r .tk{color:var(--red)}
.tile.s{background:#eef1f6}.tile.s .tk{color:var(--slate)}

/* skills */
.skill-row{display:flex;align-items:center;border:1px solid var(--line);border-left:4px solid var(--slate);
  border-radius:9px;padding:8px 12px;margin-bottom:6px;font-size:13px}
.skill-row .sk-prof{width:9px;height:9px;border-radius:50%;border:1.5px solid var(--dim);margin-right:9px;flex-shrink:0}
.skill-row .sk-prof.on{background:var(--blue);border-color:var(--blue)}
.skill-row .sk-bonus{margin-left:auto;font-weight:800}
.skill-row .sk-ab{color:var(--dim);font-size:10px;text-transform:uppercase;margin-left:8px;width:30px;text-align:right}

/* inventory */
.inv-section{margin-bottom:18px}
.slot-grid{display:grid;grid-template-columns:repeat(8,1fr);gap:10px}
@media(max-width:1100px){.slot-grid{grid-template-columns:repeat(6,1fr)}}
.slot{aspect-ratio:1;border:1px solid var(--line);border-radius:11px;background:var(--bg);
  display:flex;align-items:center;justify-content:center;font-size:24px;position:relative;color:#aab4c5}
.slot.filled{background:var(--panel);border-color:#d3deef;box-shadow:inset 0 0 0 2px #fff,var(--shadow);color:var(--ink)}
.slot.empty{border-style:dashed}
.slot .badge{position:absolute;top:-6px;right:-6px;background:var(--blue);color:#fff;font-size:10px;font-weight:800;
  border-radius:10px;padding:1px 6px}
.slot.lvl::before{content:'';position:absolute;left:0;top:14%;bottom:14%;width:3px;border-radius:3px}
.slot.lvl-p::before{background:var(--purple)}.slot.lvl-b::before{background:var(--blue)}.slot.lvl-g::before{background:var(--green)}
.slot .lbl{position:absolute;bottom:4px;font-size:8px;color:var(--dim);text-transform:uppercase;letter-spacing:.3px}
.inv-note{font-size:12px;color:var(--dim);margin-top:6px;display:flex;align-items:center;gap:6px}

/* class & race */
.cr-grid{display:grid;grid-template-columns:1fr 1fr;gap:16px}
.cr-box label{font-size:13px;font-weight:700;margin-bottom:8px;display:block}
.cr-pill{padding:14px 16px;border-radius:11px;font-weight:700}
.cr-pill.race{background:#eef3ff;color:var(--blue)}
.cr-pill.cls{background:#e9f7f0;color:var(--green)}
.cr-desc{font-size:13px;color:var(--dim);line-height:1.7;margin-top:12px}
.feat-list{list-style:none;display:flex;flex-direction:column;gap:8px;margin-top:8px}
.feat-list li{display:flex;gap:10px;padding:11px 13px;border:1px solid var(--line);border-radius:10px;font-size:13px;line-height:1.5}
.feat-list li .fi{font-size:18px;flex-shrink:0}
.feat-list li b{display:block;margin-bottom:2px}
.feat-list li .fd{color:var(--dim)}

/* actions */
.turn-bar{display:flex;gap:12px;margin-bottom:18px}
.turn-btn{padding:12px 20px;border-radius:11px;border:none;font-weight:700;font-size:14px;cursor:default;
  color:#fff;display:flex;align-items:center;gap:8px;box-shadow:0 2px 0 rgba(0,0,0,.15)}
.turn-btn.green{background:var(--green)}.turn-btn.purple{background:var(--purple)}
.act-group-lbl{display:flex;align-items:center;gap:8px;font-weight:700;margin:6px 0 12px}
.act-group-lbl .dot{width:9px;height:9px;border-radius:50%;background:var(--green)}
.act-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(230px,1fr));gap:12px}
.act-btn{background:linear-gradient(180deg,#b4682f,#9a531f);border:1px solid #7d3f12;border-radius:11px;
  padding:16px 18px;color:#fff;display:flex;align-items:center;gap:14px;box-shadow:0 2px 0 rgba(0,0,0,.2);font-weight:700}
.act-btn .ai{font-size:20px;filter:drop-shadow(0 0 6px rgba(255,180,90,.7))}
.act-btn .am{font-size:11px;font-weight:500;opacity:.85;margin-top:2px}
.act-btn.spell{background:linear-gradient(180deg,#6d4bd0,#5938b8);border-color:#46289a}
.act-btn.cantrip{background:linear-gradient(180deg,#3f7fd6,#2f66b8);border-color:#244f93}

/* passives */
.pass-list{display:grid;grid-template-columns:1fr 1fr;gap:12px}
@media(max-width:900px){.pass-list{grid-template-columns:1fr}}
.pass{border:1px solid var(--line);border-radius:12px;padding:14px 16px;display:flex;gap:13px}
.pass .pi{font-size:24px;flex-shrink:0}
.pass .pn{font-weight:800;margin-bottom:3px}
.pass .pd{font-size:12.5px;color:var(--dim);line-height:1.6}

.toast{position:fixed;bottom:22px;right:22px;background:var(--panel);border:1px solid var(--line);
  border-radius:11px;padding:11px 16px;font-size:13px;box-shadow:var(--shadow);z-index:60;animation:ti .2s}
.toast.err{border-color:var(--red);color:var(--red)}
@keyframes ti{from{transform:translateY(8px);opacity:0}to{transform:none;opacity:1}}
.hidden{display:none!important}
</style>
</head>
<body>

<div class="topbar">
  <div class="brand"><span class="swords">⚔</span> D&D 2024</div>
  <nav class="topnav">
    <a href="/" >Бой</a>
    <a href="/characters" class="on">Персонажи</a>
    <a href="/spellbook">Заклинания</a>
  </nav>
  <div class="spacer"></div>
  <a class="btn" href="/">⚔ К бою</a>
  <button class="btn btn-primary" id="top-create" onclick="goCreate()">＋ Создать</button>
</div>

<div class="wrap">
  <!-- CATALOG VIEW -->
  <div id="view-catalog">
    <div class="cat-head">
      <div>
        <h1>Каталог персонажей</h1>
        <div class="cat-sub">Сохранённые герои. Нажмите на карточку, чтобы открыть детальный лист.</div>
      </div>
      <button class="btn" onclick="loadCatalog()">↻ Обновить</button>
    </div>
    <div class="cat-grid" id="cat-grid"></div>
  </div>

  <!-- SHEET VIEW -->
  <div id="view-sheet" class="hidden">
    <div class="sheet-head">
      <div class="back" onclick="showCatalog()">‹ Каталог</div>
    </div>
    <div class="hero-id" id="hero-id" style="margin-bottom:18px"></div>
    <div class="tabs" id="tabs"></div>
    <div id="tab-body"></div>
  </div>
</div>

<script>
const API_BASE = (location.origin && location.origin.startsWith('http')) ? location.origin : 'http://localhost:8765';
async function req(method, path, body){
  const r = await fetch(API_BASE + path, { method, headers:{'Content-Type':'application/json'},
    body: body ? JSON.stringify(body) : undefined });
  const d = await r.json().catch(()=>({}));
  if(!r.ok) throw new Error(d.detail || `HTTP ${r.status}`);
  return d;
}
function toast(m, err){ const t=document.createElement('div'); t.className='toast'+(err?' err':''); t.textContent=m;
  document.body.appendChild(t); setTimeout(()=>t.remove(), err?3500:2200); }

// ── Rules data ──────────────────────────────────────────────────────────────
const ABIL = [
  {key:'strength', ru:'СИЛ', color:'var(--red)'},
  {key:'dexterity', ru:'ЛОВ', color:'var(--green)'},
  {key:'constitution', ru:'ТЕЛ', color:'var(--slate)'},
  {key:'intelligence', ru:'ИНТ', color:'var(--blue)'},
  {key:'wisdom', ru:'МУД', color:'var(--amber)'},
  {key:'charisma', ru:'ХАР', color:'var(--purple)'},
];
const AB_RU = Object.fromEntries(ABIL.map(a=>[a.key,a.ru]));
const AB_COLOR = Object.fromEntries(ABIL.map(a=>[a.key,a.color]));
const SKILLS = [
  ['Атлетика','strength'],
  ['Акробатика','dexterity'],['Ловкость рук','dexterity'],['Скрытность','dexterity'],
  ['История','intelligence'],['Магия','intelligence'],['Природа','intelligence'],['Расследование','intelligence'],['Религия','intelligence'],
  ['Восприятие','wisdom'],['Выживание','wisdom'],['Дрессировка','wisdom'],['Медицина','wisdom'],['Проницательность','wisdom'],
  ['Выступление','charisma'],['Запугивание','charisma'],['Обман','charisma'],['Убеждение','charisma'],
];
const SAVE_PROFS = { Fighter:['strength','constitution'], Wizard:['intelligence','wisdom'] };
const DEFAULT_SKILL_PROFS = { Fighter:['Атлетика','Запугивание'], Wizard:['Магия','История'] };
const CLASS_RU = { Fighter:'Воин', Wizard:'Волшебник' };
const CLASS_DESC = {
  Fighter:'Мастер оружия и доспехов. Боевые стили, мастерство оружия, Второе дыхание и Всплеск действия.',
  Wizard:'Учёный тайной магии. Заговоры и заклинания 1–2 круга, спасброски по Интеллекту, концентрация.',
};
const WIZ_SLOTS = { 1:{1:2}, 2:{1:3}, 3:{1:4,2:2}, 4:{1:4,2:3} };

function mod(score){ return Math.floor((score-10)/2); }
function fmt(n){ return (n>=0?'+':'')+n; }
function profBonus(level){ return 2 + Math.floor((level-1)/4); }
function defaultScores(cls){
  return cls==='Wizard'
    ? {strength:8,dexterity:14,constitution:14,intelligence:17,wisdom:12,charisma:10}
    : {strength:17,dexterity:13,constitution:15,intelligence:8,wisdom:12,charisma:10};
}

function buildSheet(tpl){
  const cls = tpl.class_name || 'Fighter';
  const level = tpl.level || 1;
  const scores = { ...defaultScores(cls), ...(tpl.ability_scores||{}) };
  const prof = profBonus(level);
  const saveProfs = SAVE_PROFS[cls] || [];
  const skillProfs = tpl.skill_proficiencies || DEFAULT_SKILL_PROFS[cls] || [];

  const hitDie = cls==='Wizard'?6:10;
  const conMod = mod(scores.constitution);
  const dexMod = mod(scores.dexterity);
  const avg = Math.floor(hitDie/2)+1;
  const maxHp = (hitDie+conMod) + (level-1)*(avg+conMod);
  let ac;
  if (cls==='Wizard') ac = 10 + dexMod;
  else ac = (tpl.preset==='greatsword') ? 16 : 18;
  const perception = 10 + mod(scores.wisdom) + (skillProfs.includes('Восприятие')?prof:0);

  return { tpl, cls, level, scores, prof, saveProfs, skillProfs, maxHp, ac,
    dexMod, perception, speed:30 };
}

// ── Catalog ─────────────────────────────────────────────────────────────────
let CATALOG = [];
async function loadCatalog(){
  try { CATALOG = await req('GET','/saved-characters'); }
  catch(e){ CATALOG = []; toast(e.message, true); }
  renderCatalog();
}
function renderCatalog(){
  const grid = document.getElementById('cat-grid');
  let html = CATALOG.map(tpl=>{
    const s = buildSheet(tpl);
    const raceCls = `${tpl.race?tpl.race+' · ':''}${CLASS_RU[s.cls]||s.cls} · ур.${s.level}`;
    return `<div class="cat-card" onclick="openSheet('${tpl.id}')">
      <button class="cc-del" onclick="event.stopPropagation();delChar('${tpl.id}')">🗑</button>
      <div class="cc-top">
        <div class="pf">${tpl.portrait||'🧙'}</div>
        <div><div class="cc-name">${esc(tpl.name)}</div><div class="cc-meta">${esc(raceCls)}</div></div>
      </div>
      <div class="cc-stats">
        <div class="mini-stat"><div class="v">${s.maxHp}</div><div class="k">Хиты</div></div>
        <div class="mini-stat"><div class="v">${s.ac}</div><div class="k">Защита</div></div>
        <div class="mini-stat"><div class="v">${fmt(s.prof)}</div><div class="k">Маст.</div></div>
      </div>
    </div>`;
  }).join('');
  html += `<div class="add-card" onclick="goCreate()"><div class="plus">＋</div>Создать персонажа</div>`;
  if (!CATALOG.length){
    html = `<div class="cat-empty">Пока нет сохранённых героев.<br>Создайте персонажа на странице боя и сохраните его в библиотеку.</div>` + `<div class="add-card" onclick="goCreate()"><div class="plus">＋</div>Создать персонажа</div>`;
  }
  grid.innerHTML = html;
}
async function delChar(id){
  if(!confirm('Удалить персонажа из каталога?')) return;
  try{ await req('DELETE', `/saved-characters/${id}`); toast('Удалено'); loadCatalog(); }
  catch(e){ toast(e.message, true); }
}
function goCreate(){ location.href = '/?create=1'; }

// ── Sheet ───────────────────────────────────────────────────────────────────
let SHEET = null, TAB = 'main';
const TABS = [
  ['main','👤 Основное'], ['class','✦ Класс и Раса'], ['inv','📦 Инвентарь'],
  ['act','🗡 Действия'], ['pass','✦ Пассивы'],
];
function showCatalog(){ document.getElementById('view-sheet').classList.add('hidden');
  document.getElementById('view-catalog').classList.remove('hidden'); location.hash=''; }
function openSheet(id){
  const tpl = CATALOG.find(c=>c.id===id);
  if(!tpl) return;
  SHEET = buildSheet(tpl); TAB='main';
  location.hash = 'c/'+id;
  document.getElementById('view-catalog').classList.add('hidden');
  document.getElementById('view-sheet').classList.remove('hidden');
  renderHeroId(); renderTabs(); renderTab();
}
function renderHeroId(){
  const {tpl,cls,level} = SHEET;
  document.getElementById('hero-id').innerHTML = `
    <div class="pf">${tpl.portrait||'🧙'}</div>
    <div><div class="hn">${esc(tpl.name)}</div>
      <div class="hm">${tpl.race?esc(tpl.race)+' · ':''}${CLASS_RU[cls]||cls} · уровень ${level}${tpl.background?' · '+esc(tpl.background):''}</div></div>`;
}
function renderTabs(){
  document.getElementById('tabs').innerHTML = TABS.map(([k,l])=>
    `<div class="tab ${TAB===k?'on':''}" onclick="setTab('${k}')">${l}</div>`).join('');
}
function setTab(k){ TAB=k; renderTabs(); renderTab(); }
function renderTab(){
  const body = document.getElementById('tab-body');
  if (TAB==='main') body.innerHTML = viewMain();
  else if (TAB==='class') body.innerHTML = viewClass();
  else if (TAB==='inv') body.innerHTML = `<div class="card">${invHtml(true)}</div>`;
  else if (TAB==='act') body.innerHTML = viewActions();
  else if (TAB==='pass') body.innerHTML = viewPassives();
}

// Main tab: abilities + skills + inventory
function viewMain(){
  const s = SHEET;
  const abilityRows = ABIL.map(a=>{
    const m = mod(s.scores[a.key]);
    const isSave = s.saveProfs.includes(a.key);
    const save = m + (isSave?s.prof:0);
    return `<div class="stat-row" style="border-left-color:${a.color}">
      <span class="sr-name">${a.ru}</span>
      <span class="sr-score">${s.scores[a.key]}</span>
      <span class="sr-mod" style="color:${a.color}">${fmt(m)}</span>
      <span class="sr-save ${isSave?'prof':''}">${fmt(save)}</span>
    </div>`;
  }).join('');

  const tiles = `<div class="tiles">
    <div class="tile b"><div class="tk">Уровень</div><div class="tv">${s.level}</div></div>
    <div class="tile p"><div class="tk">Мастерство</div><div class="tv">${fmt(s.prof)}</div></div>
    <div class="tile g"><div class="tk">Защита</div><div class="tv">${s.ac}</div></div>
    <div class="tile o"><div class="tk">Скорость</div><div class="tv">${s.speed}</div></div>
    <div class="tile r"><div class="tk">Хиты</div><div class="tv">${s.maxHp}/${s.maxHp}</div></div>
    <div class="tile b"><div class="tk">Восприятие</div><div class="tv">${s.perception}</div></div>
  </div>`;

  const skillRows = SKILLS.map(([name,ab])=>{
    const isProf = s.skillProfs.includes(name);
    const bonus = mod(s.scores[ab]) + (isProf?s.prof:0);
    return `<div class="skill-row" style="border-left-color:${AB_COLOR[ab]}">
      <span class="sk-prof ${isProf?'on':''}"></span>${name}
      <span class="sk-ab">${AB_RU[ab]}</span>
      <span class="sk-bonus" style="color:${AB_COLOR[ab]}">${fmt(bonus)}</span>
    </div>`;
  }).join('');

  return `<div class="main-grid">
    <div class="card">
      <h2>Характеристики</h2>
      <div class="col-key"><span>мод</span><span>спас</span></div>
      ${abilityRows}${tiles}
    </div>
    <div class="card"><h2>Навыки</h2>${skillRows}</div>
    <div class="card"><h2>Инвентарь</h2>${invHtml(false)}</div>
  </div>`;
}

// Equipment + backpack (item service is external; this shows what the class grants)
function weaponInfo(s){
  if (s.cls==='Wizard') return {icon:'🗡', name:'Кинжал', sub:'1d4 колющий · фехт.', lvl:'lvl-b'};
  if (s.tpl.preset==='greatsword') return {icon:'⚔', name:'Двуручный меч', sub:'2d6 рубящий', lvl:'lvl-p'};
  return {icon:'🗡', name:'Длинный меч', sub:'1d8 рубящий', lvl:'lvl-p'};
}
function invHtml(full){
  const s = SHEET;
  const w = weaponInfo(s);
  const offhand = (s.cls==='Fighter' && s.tpl.preset==='longsword_shield')
    ? {icon:'🛡', name:'Щит', lbl:'щит'} : {empty:true, lbl:'рука'};
  const armor = s.cls==='Wizard' ? {empty:true, lbl:'доспех'} : {icon:'🥋', name:'Кольчуга', lbl:'доспех'};
  const equip = [
    {icon:w.icon, name:w.name, lbl:'оружие', lvl:w.lvl},
    offhand,
    {empty:true, lbl:'кольцо'},
    {empty:true, lbl:'шлем'},
    armor,
    {empty:true, lbl:'плащ'},
    {empty:true, lbl:'сапоги'},
    {empty:true, lbl:'амулет'},
  ];
  const slot = (it)=> it.empty
    ? `<div class="slot empty"><span class="lbl">${it.lbl||''}</span></div>`
    : `<div class="slot filled ${it.lvl?('lvl '+it.lvl):''}" title="${esc(it.name||'')}">${it.icon}<span class="lbl">${it.lbl||''}</span></div>`;

  let backpack = '';
  if (full){
    let cells = '';
    for (let i=0;i<24;i++) cells += `<div class="slot empty"></div>`;
    backpack = `<div class="inv-section"><h3>Рюкзак</h3><div class="slot-grid">${cells}</div></div>`;
  }
  return `<div class="inv-section"><h3>Экипировка</h3>
      <div class="slot-grid">${equip.map(slot).join('')}</div></div>
    ${backpack}
    <div class="inv-note">🔌 Предметы подключаются из внешнего сервиса снаряжения (интеграция в разработке).</div>`;
}

// Class & Race tab
function viewClass(){
  const s = SHEET, tpl = s.tpl;
  const feats = classFeatures(s).map(f=>`<li><span class="fi">${f.icon}</span>
    <div><b>${f.name}</b><span class="fd">${f.desc}</span></div></li>`).join('');
  return `<div class="card">
    <h2>Класс и Раса</h2>
    <div class="cr-grid">
      <div class="cr-box"><label>Раса</label><div class="cr-pill race">${esc(tpl.race||'Не выбрана')}</div></div>
      <div class="cr-box"><label>Класс</label><div class="cr-pill cls">${CLASS_RU[s.cls]||s.cls}</div></div>
    </div>
    <div class="cr-desc">${CLASS_DESC[s.cls]||''}</div>
    <h3 style="margin-top:20px">Классовые особенности · ур.${s.level}</h3>
    <ul class="feat-list">${feats}</ul>
  </div>`;
}

function classFeatures(s){
  const out = [];
  if (s.cls==='Fighter'){
    const style = s.tpl.preset==='greatsword' ? 'Великое оружие (переброс 1–2 урона)' : 'Дуэлянт (+2 к урону одноручным)';
    const mast = s.tpl.preset==='greatsword' ? 'GRAZE, CLEAVE' : 'SAP, TOPPLE';
    out.push({icon:'🛡', name:'Боевой стиль', desc:style});
    out.push({icon:'⚔', name:'Мастерство оружия', desc:mast});
    out.push({icon:'💚', name:'Второе дыхание', desc:'Бонусным действием восстановить 1d10+уровень хитов (восст. на отдыхе).'});
    if (s.level>=2) out.push({icon:'⚡', name:'Всплеск действия', desc:'Раз за отдых получить дополнительное действие в свой ход.'});
    if (s.level>=3) out.push({icon:'★', name:'Воинский архетип', desc:'Подкласс на 3 уровне (в разработке).'});
    if (s.level>=4) out.push({icon:'➕', name:'Повышение характеристик', desc:'+2 к одной или +1 к двум характеристикам.'});
  } else {
    const intMod = mod(s.scores.intelligence);
    out.push({icon:'✦', name:'Использование заклинаний', desc:`Интеллект · Сложность спасброска ${8+s.prof+intMod}, бонус атаки ${fmt(s.prof+intMod)}.`});
    out.push({icon:'📖', name:'Книга заклинаний', desc:`${(s.tpl.cantrips||[]).length} заговоров, ${(s.tpl.spells||[]).length} подготовленных заклинаний.`});
    out.push({icon:'🔁', name:'Восстановление магии', desc:'На коротком отдыхе вернуть часть ячеек заклинаний.'});
    if (s.level>=2) out.push({icon:'🧠', name:'Магическая традиция', desc:'Школа волшебства на 2 уровне (в разработке).'});
  }
  return out;
}

// Actions tab
function viewActions(){
  const s = SHEET;
  const w = weaponInfo(s);
  const atkAbility = (s.cls==='Wizard') ? 'dexterity' : (s.tpl.preset ? 'strength':'strength');
  const toHit = s.prof + mod(s.scores[atkAbility]);
  const dmgMod = mod(s.scores[atkAbility]);
  const dmgDice = s.cls==='Wizard' ? '1d4' : (s.tpl.preset==='greatsword'?'2d6':'1d8');
  const str = mod(s.scores.strength);

  let main = `<div class="act-grid">
    <div class="act-btn"><span class="ai">🗡</span><div>Удар в ближнем бою<div class="am">${w.name} · ${fmt(toHit)} к попаданию · ${dmgDice}${fmt(dmgMod)}</div></div></div>
    <div class="act-btn"><span class="ai">✊</span><div>Безоружный удар<div class="am">${fmt(s.prof+str)} к попаданию · ${Math.max(1,1+str)} дробящий</div></div></div>
  </div>`;

  let spellsBlock = '';
  if (s.cls==='Wizard'){
    const cantrips = (s.tpl.cantrips||[]).map(n=>`<div class="act-btn cantrip"><span class="ai">✨</span><div>${esc(n)}<div class="am">заговор</div></div></div>`).join('');
    const spells = (s.tpl.spells||[]).map(n=>`<div class="act-btn spell"><span class="ai">🔮</span><div>${esc(n)}<div class="am">заклинание</div></div></div>`).join('');
    const slots = WIZ_SLOTS[s.level] || {};
    const slotTxt = Object.entries(slots).map(([lv,n])=>`${lv}-й: ${n}`).join(' · ');
    spellsBlock = `<div class="card" style="margin-top:16px">
      <div class="act-group-lbl"><span class="dot" style="background:var(--blue)"></span>Заговоры</div>
      <div class="act-grid">${cantrips||'<span style="color:var(--dim)">нет</span>'}</div>
      <div class="act-group-lbl" style="margin-top:16px"><span class="dot" style="background:var(--purple)"></span>Заклинания · ячейки: ${slotTxt}</div>
      <div class="act-grid">${spells||'<span style="color:var(--dim)">нет</span>'}</div>
    </div>`;
  }

  return `<div class="card">
    <div class="turn-bar">
      <button class="turn-btn green">↻ Следующий ход</button>
      <button class="turn-btn purple">🌙 Следующий день</button>
    </div>
  </div>
  <div class="card" style="margin-top:16px">
    <div class="act-group-lbl"><span class="dot"></span>Основные действия</div>
    ${main}
  </div>
  ${spellsBlock}`;
}

// Passives tab
function viewPassives(){
  const s = SHEET;
  const items = classFeatures(s).filter(f=>!['Повышение характеристик'].includes(f.name));
  // Add universal passives
  items.push({icon:'👁', name:'Пассивное Восприятие', desc:`Значение ${s.perception} — фоновое обнаружение скрытого.`});
  items.push({icon:'🏃', name:'Скорость', desc:`${s.speed} футов за ход.`});
  const html = items.map(f=>`<div class="pass"><span class="pi">${f.icon}</span>
    <div><div class="pn">${f.name}</div><div class="pd">${f.desc}</div></div></div>`).join('');
  return `<div class="card"><h2>Пассивные свойства</h2><div class="pass-list">${html}</div></div>`;
}

function esc(s){ return String(s).replace(/[&<>"]/g, c=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;'}[c])); }

// ── Init / routing ──
async function init(){
  await loadCatalog();
  const m = location.hash.match(/^#c\/(.+)$/);
  if (m){ const tpl = CATALOG.find(c=>c.id===m[1]); if(tpl) openSheet(m[1]); }
}
window.addEventListener('hashchange', ()=>{ if(!location.hash) showCatalog(); });
init();
</script>
